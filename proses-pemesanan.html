<!DOCTYPE html>
<html lang="id">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean.It - Proses Pemesanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://db.onlinewebfonts.com/c/1392b0e09b283a428f49882471060eb3?family=Birds+of+Paradise');

        .font-cursive {
            font-family: 'Birds of Paradise', cursive;
        }

        .font-sans {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;

        <!-- Menu -->

            <a href="tentang-kami.html" class="hover:text-blue-700 transition-colors">Tentang Kami</a>

        </div>
    </div>

    <!-- Content Section -->
    <div class="bg-[#00a8ff] w-full px-10 sm:px-20 py-24">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 text-center items-start">
                <!-- Step 1 -->
                <div class="flex flex-col items-center">
                    <div class="w-64 h-72 sm:w-80 sm:h-80 mb-8 overflow-hidden">

                </div>

                <!-- Step 2 -->
                <div class="flex flex-col items-center">
                    <div class="w-64 h-72 sm:w-80 sm:h-80 mb-8 overflow-hidden">

                    </div>
                </div>

                <!-- Step 3 -->
                <div class="flex flex-col items-center">
                    <div class="w-64 h-72 sm:w-80 sm:h-80 mb-8 overflow-hidden">
                        <img src="assets/aset3.png" alt="Ambil Bersih" class="w-full h-full object-cover">
                    </div>

                    <!-- Pesan Button -->
                    <a href="kontak.html"
                        class="inline-block bg-[#FEEC41] text-white text-5xl sm:text-6xl font-black px-12 py-4 shadow-lg hover:bg-yellow-400 transition-colors w-full max-w-[320px] uppercase">
                        PESAN
                    </a>
                </div>

            </div>
        </div>

        <div class="px-10 sm:px-20 pb-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8">
                <!-- Column 1 -->
                <div>
                    <div class="text-[#00B2FF] text-6xl font-cursive mb-4 tracking-tight">
                        Clean.It
                    </div>
                    <p class="text-[#00B2FF] text-xl font-medium mt-6">
                        Setiap Waktu, Bersih Selalu

                        <a href="tentang-kami.html" class="hover:text-blue-700 transition-colors uppercase">Tentang

            <p class="text-[#00B2FF] text-base font-medium">
                COPYRIGHTS Clean.It &copy; 2026. All rights reserved.
