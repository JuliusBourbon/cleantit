<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean.It - Galeri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .font-cursive {
            font-family: 'Dancing Script', cursive;
        }

        .font-sans {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="m-0 p-0 font-sans overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white flex justify-between items-center px-10 py-6 shadow-sm w-full z-20 relative">
        <!-- Logo -->
        <a href="index.html" class="text-[#0ea5e9] text-5xl font-cursive tracking-tight hover:opacity-80 transition-opacity">
            Clean.It
        </a>
        <!-- Menu -->
        <div class="hidden md:flex space-x-8 text-[#0ea5e9] text-sm font-bold uppercase tracking-wide">
            <a href="layanan.html" class="hover:text-blue-700 transition-colors">Layanan</a>
            <a href="tentang-kami.html" class="hover:text-blue-700 transition-colors">Tentang Kami</a>
            <a href="galeri.html" class="hover:text-blue-700 transition-colors">Galeri</a>
            <a href="proses-pemesanan.html" class="hover:text-blue-700 transition-colors">Proses Pemesanan</a>
            <a href="kontak.html" class="hover:text-blue-700 transition-colors">Kontak</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="h-[calc(100vh-100px)] w-full bg-cover bg-center relative"
        style="background-image: url('https://picsum.photos/1920/1080?sneakers');">
        <div class="absolute inset-0 bg-black/40 z-0"></div>

        <!-- Content -->
        <div class="relative z-10 h-full flex flex-col justify-end items-center pb-20">
            <h1
                class="text-[#00B2FF] text-7xl sm:text-[100px] font-cursive mb-2 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] leading-none text-center">
                Hemat Waktu ,
            </h1>
            <h2
                class="text-[#FEEC41] text-3xl sm:text-4xl font-black uppercase tracking-tight drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] text-center mt-2">
                SEPATU BERSIH SELALU.
            </h2>
        </div>
    </div>

    <!-- Content Section -->
    <div class="bg-[#00a8ff] w-full px-10 sm:px-20 py-20">
        <!-- Portofolio Title -->
        <h2 class="text-white text-5xl sm:text-7xl font-serif text-center mb-16 tracking-widest uppercase">
            Portofolio
        </h2>
        
        <!-- Gallery Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="w-full h-80 lg:h-[400px] overflow-hidden group">
                <img src="https://picsum.photos/600/800?sig=10" alt="Portofolio 1" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            </div>
            <div class="w-full h-80 lg:h-[400px] overflow-hidden group">
                <img src="https://picsum.photos/600/800?sig=11" alt="Portofolio 2" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            </div>
            <div class="w-full h-80 lg:h-[400px] overflow-hidden group">
                <img src="https://picsum.photos/600/800?sig=12" alt="Portofolio 3" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            </div>
            <div class="w-full h-80 lg:h-[400px] overflow-hidden group">
                <img src="https://picsum.photos/600/800?sig=13" alt="Portofolio 4" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            </div>
        </div>
    </div>

    <!-- Footer Section -->
    <footer class="bg-white pt-16">
        <div class="px-10 sm:px-20 pb-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8">
                <!-- Column 1 -->
                <div>
                    <div class="text-[#0ea5e9] text-6xl font-cursive mb-4 tracking-tight">
                        Clean.It
                    </div>
                    <p class="text-[#0ea5e9] text-xl font-medium mt-6">
                        Setiap Waktu, Bersih Selalu
                    </p>
                </div>
                <!-- Column 2 -->
                <div class="flex flex-col items-center">
                    <h3 class="text-[#0ea5e9] text-xl font-black uppercase tracking-widest mb-6">Tentang</h3>
                    <div class="flex flex-col items-center space-y-4 text-[#0ea5e9] text-lg font-medium">
                        <a href="layanan.html" class="hover:text-blue-700 transition-colors uppercase">Layanan</a>
                        <a href="tentang-kami.html" class="hover:text-blue-700 transition-colors uppercase">Tentang
                            Kami</a>
                        <a href="galeri.html" class="hover:text-blue-700 transition-colors uppercase">Galeri</a>
                    </div>
                </div>
                <!-- Column 3 -->
                <div class="flex flex-col items-center">
                    <h3 class="text-[#0ea5e9] text-xl font-black uppercase tracking-widest mb-6">Layanan Pelanggan</h3>
                    <div class="flex flex-col items-center space-y-4 text-[#0ea5e9] text-lg font-medium">
                        <a href="proses-pemesanan.html" class="hover:text-blue-700 transition-colors uppercase">Proses
                            Pemesanan</a>
                        <a href="kontak.html" class="hover:text-blue-700 transition-colors uppercase">Kontak</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- Copyright -->
        <div class="border-t border-[#0ea5e9]/30 py-6 text-center">
            <p class="text-[#0ea5e9] text-base font-medium">
                COPYRIGHTS Clean.It &copy; 2026. All rights reserved.
            </p>
        </div>
    </footer>

</body>

</html>
